<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{ --scale:1; }

html, body{
    margin:0;
    background:#000000;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    touch-action:manipulation;
    overflow-x:hidden;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#000000;
    z-index:10;
}


#leftPanel{
    display:flex;
    flex-direction:column;
    gap:10px;
}
#statusRight{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    min-width:140px;
}
#searchWrap{ position:relative; }

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px 52px 18px 18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);

    width:38px;
    height:38px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    cursor:pointer;
    user-select:none;

    color:#94a3b8;
    font-size:18px;

    z-index:20;

    -webkit-tap-highlight-color: transparent;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
}

#clockBox{
    font-size:34px;
    font-weight:800;
    color:#e2e8f0;
    min-width:140px;
    text-align:right;
    letter-spacing:1px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
}

#songCount{
    color:#94a3b8;
    font-size:16px;
    font-weight:600;
    min-width:120px;
    text-align:center;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}
    .chip.decade-active{
    color:#fff;
    font-weight:600;
}
#setlistPanel{

    position:fixed;

    top:0;
    right:-100%;

    width:90%;
    max-width:500px;

    height:100%;

    background:#0f172a;

    z-index:99999;

    transition:right .25s ease;

    padding:20px;

    box-sizing:border-box;

    overflow-y:auto;
}

#setlistPanel.open{
    right:0;
}

#setlistHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#setlistSongs{
    display:flex;
    flex-direction:column;
    gap:8px;
}
#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns:repeat(2,1fr);
}

@media(max-width:600px){ #results{grid-template-columns:repeat(2,1fr);} }
@media(min-width:700px){ #results{grid-template-columns:repeat(3,1fr);} }
@media(min-width:1100px){ #results{grid-template-columns:repeat(4,1fr);} }

.card{
    background:#1e293b;
    border-radius:16px;
    padding:calc(14px * var(--scale));
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:calc(16px * var(--scale));
    user-select:none;
    
}
    .plusBtn{

    font-size:24px;
    font-weight:700;

    color:#38bdf8;

    cursor:pointer;

    padding-left:10px;

    user-select:none;
}
.card.played{
    background:#475569 !important;
    opacity:0.45;
}
.title{
    font-size:calc(18px * var(--scale));
    font-weight:700;
}

.meta{
    font-size:calc(13px * var(--scale));
    color:#94a3b8;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
    font-size:calc(15px * var(--scale));
}
    #alphaNav{
    position:fixed;
    left:4px;
    top:220px;
    bottom:20px;

    display:none;
    flex-direction:column;
    justify-content:space-between;

    z-index:999;
    user-select:none;
}
    .setlistItem{

    background:#1e293b;

    padding:12px;

    border-radius:10px;

    margin-bottom:8px;
}

.setlistItem.dragging{
    opacity:.4;
}

.alphaLetter{
    font-size:11px;
    color:#94a3b8;
    cursor:pointer;
    padding:1px 3px;
    border-radius:4px;
}

.alphaLetter.active{
    font-size:16px;
    font-weight:700;
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="leftPanel">

        <div id="chipContainer"></div>
        <div id="controls">
            <span id="fontLabel">Text size</span>
            <button id="fontMinus">−</button>
            <button id="fontPlus">+</button>

            <span style="color:#94a3b8;font-size:13px;margin-left:12px;">Sort by</span>

            <button id="sortArtist">Artist</button>
            <button id="sortTitle">Title</button>
            <button id="sortBpm">BPM</button>
            <button id="sortOrder">A-Z</button>
            <button id="sortRandom">Random</button>
        </div>

    </div>

    <div id="statusRight">
    <div id="songCount"></div>
    <div id="clockBox"></div>

    <button id="openSetlist">+ Set List</button>
<button id="exportBackup">Export Backup</button>
<button id="importBackup">Import Backup</button>
<button id="resetPlayed">Reset</button>
        <input
    type="file"
    id="importFile"
    accept=".json"
    style="display:none;"
>
</div>

</div>

<div id="alphaNav"></div>
<div id="results"></div>
    <div id="setlistPanel">

    <div id="setlistHeader">
        <span>
    Set List
    (<span id="setlistCount">0</span>)
</span>
        <button id="closeSetlist">✕</button>
    </div>

    <div id="setlistSongs"></div>

</div>

<script>

let songs=[];
let currentQuery="";
let scale=1;

// NEW SORT STATE
let sortKey = "artist";
let sortDirection = 1; // A-Z default // 1 = A-Z, -1 = Z-A
let randomMode = false;

const filters=[
    "Favourites",
    "Upbeat",
    "Dancefloor",
    "Sing-a-Long",
    "Happy",
    "Easy To Sing",
    "Romantic",
    "Showcase"
];

const decadeFilters=[
    "60s",
    "70s",
    "80s",
    "90s",
    "00s",
    "10s",
    "Newer"
];

const activeFilters=new Set();
const activeDecades=new Set();
const playedSongs = new Set();
let draggedSongId = null;
let setlist =
JSON.parse(
    localStorage.getItem("setlist") || "[]"
);
function saveSetlist(){

    localStorage.setItem(
        "setlist",
        JSON.stringify(setlist)
    );
}
function pad(n){return n.toString().padStart(2,'0');}

function updateClock(){
    const now=new Date();
    document.getElementById("clockBox").innerText=
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

function applyScale(){
    document.documentElement.style.setProperty("--scale",scale);
}

function updateCount(count){
    document.getElementById("songCount").innerText = count + " songs";
}

function normalize(t){return (t||"").toLowerCase();}

function songMatches(song,q){
    q=normalize(q.trim());
    if(!q) return true;
    const text=normalize(Object.values(song).join(" "));
    if(/^\d+$/.test(q)) return new RegExp(`\\b${q}\\b`).test(text);
    if(q.includes(" ")) return q.split(/\s+/).every(w=>text.includes(w));
    return text.includes(q);
}

function passesFilters(song){

    const map={};
    Object.keys(song).forEach(
        k=>map[k.trim().toLowerCase()]=song[k]
    );

    const normalFiltersPass =
        [...activeFilters].every(f=>{
            const v=map[f.toLowerCase()];
            const s=(v||"").toString().toLowerCase();

            return (
                v===true ||
                s==="true" ||
                s==="1" ||
                s==="yes"
            );
        });

    if(!normalFiltersPass) return false;

    if(activeDecades.size===0) return true;

    const decade=(song.Decade||"").toString().trim();
    const year=parseInt(song.Year,10);

    return (
        activeDecades.has(decade) ||
        (
            activeDecades.has("Newer") &&
            year>=2020 &&
            year<=2026
        )
    );
}

// NEW SORT FUNCTION
function sortSongs(arr){

    if(randomMode){

        const shuffled = [...arr];

        for(let i = shuffled.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] =
            [shuffled[j], shuffled[i]];
        }

        return shuffled;
    }

    return [...arr].sort((a,b)=>{

        let x = "";
        let y = "";

        switch(sortKey){

            case "artist":
                x = String(a["ARTIST"] || "").toLowerCase();
                y = String(b["ARTIST"] || "").toLowerCase();
                break;

            case "title":
                x = String(a["SONG NAME"] || "").toLowerCase();
                y = String(b["SONG NAME"] || "").toLowerCase();
                break;

            case "bpm":
                x = Number(a["Tempo"] || 0);
                y = Number(b["Tempo"] || 0);
                break;
        }

        if(x > y) return sortDirection;
        if(x < y) return -sortDirection;
        return 0;
    });
}
function positionAlphabet(){

    const nav = document.getElementById("alphaNav");

    if(window.scrollY < 150){

        const firstCard =
            document.querySelector(".card");

        if(firstCard){
            nav.style.top =
                `${firstCard.getBoundingClientRect().top}px`;
        }

    }else{

        nav.style.top = "20px";
    }
}
function buildChips(){

    const c=document.getElementById("chipContainer");
    c.innerHTML="";
    // Existing filters
    filters.forEach(f=>{

        const d=document.createElement("div");
        d.className="chip";
        d.innerText=f;

        d.onclick=()=>{

            if(activeFilters.has(f))
                activeFilters.delete(f);
            else
                activeFilters.add(f);

            d.classList.toggle("active");

            render();
        };

       c.appendChild(d);
    });
    const spacer = document.createElement("div");
spacer.style.flexBasis = "100%";
c.appendChild(spacer);

    // Decade filters
    decadeFilters.forEach(decade=>{

        const d=document.createElement("div");
        d.className="chip";
        d.innerText=decade;

        d.onclick=()=>{

            if(activeDecades.has(decade)){

    activeDecades.delete(decade);

    d.classList.remove("decade-active");
    d.style.background = "";

}else{

    activeDecades.add(decade);

    d.classList.add("decade-active");
    d.style.background = getDecadeColor(decade);
}

            render();
        };

        c.appendChild(d);
    });

    // Clear button
    const clear=document.createElement("div");
    clear.className="chip";
    clear.innerText="✕";

    clear.onclick=()=>{

        activeFilters.clear();
        activeDecades.clear();

        document
    .querySelectorAll(".chip")
    .forEach(chip=>{
        chip.classList.remove("active");
        chip.classList.remove("decade-active");
        chip.style.background = "";
    });

        render();
    };

   c.appendChild(clear);
}

function getDecadeColor(decade){
    const d=(decade||"").toString().toLowerCase().trim();

    if(d.includes("1920") || d.includes("20s")) return "#212121";
    if(d.includes("1930") || d.includes("30s")) return "#331f1e";
    if(d.includes("1940") || d.includes("40s")) return "#3e5347";
    if(d.includes("1950") || d.includes("50s")) return "#543424";
    if(d.includes("1960") || d.includes("60s")) return "#695b30";
    if(d.includes("1970") || d.includes("70s")) return "#211708";
    if(d.includes("1980") || d.includes("80s")) return "#2a0e02";
    if(d.includes("1990") || d.includes("90s")) return "#29331e";
    if(d.includes("2000") || d.includes("00s")) return "#405674";
    if(d.includes("2010") || d.includes("10s")) return "#1e2533";
    if(d.includes("2020")) return "#1c0f1a";

    return "#1e293b";
}

function getFlag(country){
    if(!country) return "";

    const flags={
        "united kingdom":"🇬🇧",
        "uk":"🇬🇧",
        "england":"🇬🇧",
        "usa":"🇺🇸",
        "united states":"🇺🇸",
        "canada":"🇨🇦",
        "france":"🇫🇷",
        "germany":"🇩🇪",
        "italy":"🇮🇹",
        "spain":"🇪🇸",
        "ireland":"🇮🇪",
        "sweden":"🇸🇪",
        "australia":"🇦🇺",
        "new zealand":"🇳🇿",
        "japan":"🇯🇵"
    };

    return flags[country.toString().toLowerCase()] || "";
}
function buildAlphabet(filtered){

    const nav=document.getElementById("alphaNav");

    if(
        sortKey!=="artist" &&
        sortKey!=="title"
    ){
        nav.style.display="none";
        return;
    }

    nav.style.display="flex";
    nav.innerHTML="";

    const letters = [
    "#",
    ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ"
];

    letters.forEach(letter=>{

        const d=document.createElement("div");
        d.className="alphaLetter";
        d.innerText=letter;

        d.onclick=()=>{

            const target=[...document.querySelectorAll(".card")]
    .find(card =>
        card.dataset.letter === letter &&
        card.offsetParent !== null
    );
            if(target){
                const y =
    target.getBoundingClientRect().top +
    window.scrollY -
    10;

window.scrollTo({
    top:y,
    behavior:"auto"
});
            }
        };

        nav.appendChild(d);
    });
}
    function moveSetlistItem(
    draggedId,
    targetId
){

    const from =
        setlist.indexOf(draggedId);

    const to =
        setlist.indexOf(targetId);

    if(
        from === -1 ||
        to === -1
    ) return;

    const item =
        setlist.splice(from,1)[0];

    setlist.splice(to,0,item);

    saveSetlist();

    renderSetlist();
}
    function renderSetlist(){

    const container =
        document.getElementById("setlistSongs");

    if(!container) return;

    container.innerHTML="";
        const count =
    document.getElementById("setlistCount");

if(count){
    count.innerText =
        setlist.length;
}

    setlist.forEach(songId=>{

        const song = songs.find(s=>

            (s["SONG NAME"]||"") +
            "|" +
            (s["ARTIST"]||"")
            === songId
        );

        if(!song) return;

        const div =
            document.createElement("div");
        div.draggable = true;
div.dataset.songid = songId;

        div.style.background="#1e293b";
        div.style.padding="10px";
        div.style.borderRadius="10px";

        const link = song.Link || song.link || "";
const wiki = song.Wiki || song.wiki || "";

div.innerHTML=`

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
">

    <div style="flex:1;">

        <strong>${song["SONG NAME"]}</strong>
        <br>
        ${song["ARTIST"]}

        <div style="
            margin-top:8px;
            display:flex;
            gap:12px;
        ">

            ${
                link
                ? `<a href="${link}" target="_blank">Open</a>`
                : ""
            }

            ${
                wiki
                ? `<a href="${wiki}" target="_blank">Wiki</a>`
                : ""
            }

        </div>

    </div>

    <button
        class="removeSetSong"
        data-id="${songId}"
    >
        ✕
    </button>

</div>

`;
        const removeBtn =
    div.querySelector(".removeSetSong");

removeBtn.onclick=()=>{

    setlist =
        setlist.filter(
            id => id !== songId
        );

    saveSetlist();

    render();
    renderSetlist();
};
div.addEventListener("dragstart",()=>{

    div.classList.add("dragging");

    draggedSongId = songId;
});

div.addEventListener("dragend",()=>{

    div.classList.remove("dragging");
});
        div.addEventListener(
    "dragover",
    e=>{
        e.preventDefault();
    }
);

div.addEventListener(
    "drop",
    e=>{

        e.preventDefault();

        moveSetlistItem(
            draggedSongId,
            songId
        );
    }
);
        container.appendChild(div);
    });
}
function render(){
    const r=document.getElementById("results");
    r.innerHTML="";

    document.getElementById("clearSearch").style.display =
        currentQuery ? "flex" : "none";

  let filtered=songs.filter(
    s=>songMatches(s,currentQuery)&&passesFilters(s)
);

// APPLY SORT
filtered = sortSongs(filtered);

buildAlphabet(filtered);

filtered.forEach((song,index)=>{
    const songId =
    (song["SONG NAME"] || "") +
    "|" +
    (song["ARTIST"] || "");
    const inSetlist =
    setlist.includes(songId);

        const div=document.createElement("div");

        let anchorText="";

        if(sortKey==="artist"){
    anchorText = String(song["ARTIST"] || "").trim();
}
else if(sortKey==="title"){
    anchorText = String(song["SONG NAME"] || "").trim();
}



const firstLetter =
    (anchorText.charAt(0) || "").toUpperCase();

const rawLetter = firstLetter || "";

const cleanLetter =
    anchorText
        .replace(/^[^A-Z0-9]+/i, "")
        .charAt(0)
        .toUpperCase();

if(/[A-Z]/.test(cleanLetter)){
    div.dataset.letter = cleanLetter;
}else{
    div.dataset.letter = "#";
}

        div.className="card";
        div.style.background=getDecadeColor(song.Decade);
    let pressTimer;

div.addEventListener("pointerdown", () => {

    pressTimer = setTimeout(() => {

        alert(
            "Edit: " +
            (song["SONG NAME"] || "")
        );

    }, 700);

});

div.addEventListener("pointerup", () => {
    clearTimeout(pressTimer);
});

div.addEventListener("pointerleave", () => {
    clearTimeout(pressTimer);
});

div.addEventListener("pointercancel", () => {
    clearTimeout(pressTimer);
});
    if(playedSongs.has(songId)){
    div.classList.add("played");
}
    let pressTimer;


    div.addEventListener("dblclick",()=>{

    if(playedSongs.has(songId)){
        playedSongs.delete(songId);
        div.classList.remove("played");
    }else{
        playedSongs.add(songId);
        div.classList.add("played");
    }

});

        const link=song.Link||song.link||"";
        const wiki=song.Wiki||song.wiki||"";

        const openHTML=link.trim()
            ? `<a href="${link}" target="_blank">Open</a>`
            : "<span></span>";

        const wikiHTML=wiki.trim()
            ? `<a href="${wiki}" target="_blank">Wiki</a>`
            : "<span></span>";

        const meta=[];
        if(song.Year) meta.push(song.Year);
        if(song.Genre) meta.push(song.Genre);
        if(song.Tempo) meta.push(`${song.Tempo} bpm`);

        const flag=getFlag(song["Country of Origin"]);
        if(flag) meta.push(flag);

        div.innerHTML=`

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
">

    <div style="flex:1;">

        <div class="title">
            ${song["SONG NAME"]||""}
        </div>

        <div>
            ${song["ARTIST"]||""}
        </div>

    </div>

    <div
        class="plusBtn"
        data-songid="${songId}"
    >
        ${inSetlist ? "✓" : "+"}
    </div>

</div>

<div class="meta">
    ${meta.join(" • ")}
</div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">
    ${openHTML}
    ${wikiHTML}
</div>
`;
const plusBtn =
    div.querySelector(".plusBtn");

plusBtn.onclick=(e)=>{

    e.stopPropagation();

    if(setlist.includes(songId)){

        setlist =
            setlist.filter(
                id => id !== songId
            );

    }else{

        setlist.push(songId);
    }

    saveSetlist();

    render();
    renderSetlist();
};
        r.appendChild(div);
    });

    updateClock();
updateCount(filtered.length);
positionAlphabet();

}

// EVENTS
document.getElementById("search").oninput=e=>{
    currentQuery=e.target.value;
    render();
};

document.getElementById("clearSearch").onclick = () => {

    const search = document.getElementById("search");

    search.value = "";
    currentQuery = "";

    // closes mobile keyboard
    search.blur();

    render();
};

document.getElementById("fontPlus").onclick=()=>{
    scale=Math.min(2,scale+0.1);
    applyScale();
};

document.getElementById("fontMinus").onclick=()=>{
    scale=Math.max(0.6,scale-0.1);
    applyScale();
};

// SORT BUTTON EVENTS
document.getElementById("sortArtist").onclick = () => {
    randomMode = false;
    sortKey = "artist";
    render();
};

document.getElementById("sortTitle").onclick = () => {
    randomMode = false;
    sortKey = "title";
    sortDirection = 1;
    render();
};
document.getElementById("sortBpm").onclick = () => {
    randomMode = false;
    sortKey = "bpm";
    render();
};
document.getElementById("sortOrder").onclick = () => {

    sortDirection *= -1;

    const btn = document.getElementById("sortOrder");

    btn.innerText =
        sortDirection === 1 ? "A-Z" : "Z-A";

    render();
};

document.getElementById("sortRandom").onclick = () => {

    randomMode = true;

    render();
};
    document.getElementById("resetPlayed").onclick=()=>{

    playedSongs.clear();

    document
        .querySelectorAll(".card")
        .forEach(card=>card.classList.remove("played"));
};

async function load(){

    const localSongs =
        localStorage.getItem("songsData");

    if(localSongs){

        songs = JSON.parse(localSongs);

    }else{

        try{

            songs =
                await (
                    await fetch("songs.json")
                ).json();

            localStorage.setItem(
                "songsData",
                JSON.stringify(songs)
            );

        }catch(e){

            songs = JSON.parse(
                localStorage.getItem("cache") || "[]"
            );
        }
    }

    buildChips();
    render();
}
window.addEventListener("scroll",()=>{

    if(
        sortKey!=="artist" &&
        sortKey!=="title"
    ){
        return;
    }

    const cards=[...document.querySelectorAll(".card")];

    let currentLetter="A";

    for(const card of cards){

        const rect=card.getBoundingClientRect();

        if(rect.top<=150){
            currentLetter=card.dataset.letter||currentLetter;
        }else{
            break;
        }
    }

    document
        .querySelectorAll(".alphaLetter")
        .forEach(el=>{

            el.classList.toggle(
                "active",
                el.innerText===currentLetter
            );
        });
});

window.addEventListener("scroll", positionAlphabet);

setInterval(updateClock,1000);
document.getElementById("clearSearch").style.display = "none";
document
.getElementById("openSetlist")
.onclick=()=>{

    renderSetlist();

    document
        .getElementById("setlistPanel")
        .classList.add("open");
};

document
.getElementById("closeSetlist")
.onclick=()=>{

    document
        .getElementById("setlistPanel")
        .classList.remove("open");
};
    document
.getElementById("exportBackup")
.onclick = () => {

    const data = JSON.stringify(
    JSON.parse(
        localStorage.getItem("songsData")
    ),
    null,
    2
);

    if(!data){
        alert("No song data found.");
        return;
    }

    const blob = new Blob(
        [data],
        { type:"application/json" }
    );

    const a =
        document.createElement("a");

    const now = new Date();

    const stamp =
        now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        `SongBackup_${stamp}.json`;

    a.click();

    URL.revokeObjectURL(a.href);
};
    document
.getElementById("importBackup")
.onclick = () => {

    document
        .getElementById("importFile")
        .click();
};

document
.getElementById("importFile")
.addEventListener(
    "change",
    async e => {

        const file =
            e.target.files[0];

        if(!file) return;

        try{

            const text =
                await file.text();

            const imported =
                JSON.parse(text);

            if(!Array.isArray(imported)){

                alert(
                    "Invalid backup file."
                );

                return;
            }

            localStorage.setItem(
                "songsData",
                JSON.stringify(imported)
            );

            songs = imported;

            render();

            alert(
                "Backup imported successfully."
            );

        }catch(err){

            alert(
                "Could not import file."
            );
        }
    }
);
    load();
applyScale();
updateClock();

</script>
