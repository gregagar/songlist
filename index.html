<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
    --scale:1;
    --subScale:1;
}

html, body{
    margin:0;
    background:#000000;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    touch-action:manipulation;
    overflow-x:hidden;
}

.header{
    position:fixed;
    top:0;
    left:0;
    right:0;

    padding:20px;
    box-sizing:border-box;

    background:#000000;
    z-index:10000;

    box-shadow:0 8px 18px rgba(0,0,0,.45);
}


#leftPanel{
    display:flex;
    flex-direction:column;
    gap:10px;
}
#statusRight{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    min-width:140px;
}
#searchWrap{ position:relative; }

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px 52px 18px 18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);

    width:38px;
    height:38px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    cursor:pointer;
    user-select:none;

    color:#94a3b8;
    font-size:18px;

    z-index:20;

    -webkit-tap-highlight-color: transparent;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
}

#clockBox{
    font-size:34px;
    font-weight:800;
    color:#e2e8f0;
    min-width:140px;
    text-align:right;
    letter-spacing:1px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
}
    #setlistOverlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    opacity:0;
    pointer-events:none;

    transition:opacity .25s ease;

    z-index:99998;
}

#setlistOverlay.open{

    opacity:1;
    pointer-events:auto;
}
    #editOverlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    opacity:0;
    pointer-events:none;

    transition:opacity .25s ease;

    z-index:99999;
}

#editOverlay.open{
    opacity:1;
    pointer-events:auto;
}
    #editPanel{
    position:fixed;
    top:0;
    right:-100%;
    width:90%;
    max-width:600px;
    height:100%;
    background:#0f172a;
    z-index:100000;
    transition:right .25s ease;
    overflow-y:auto;
    padding:20px;
    box-sizing:border-box;
}

#editPanel.open{
    right:0;
}

#editHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#editForm{
    display:flex;
    flex-direction:column;
    gap:12px;
}

#editForm label{
    font-size:13px;
    color:#94a3b8;
}

#editForm input,
#editForm select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}
    #editOverlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    opacity:0;
    pointer-events:none;

    transition:opacity .25s ease;

    z-index:99999;
}

#editOverlay.open{
    opacity:1;
    pointer-events:auto;
}

#saveSongBtn{
    margin-top:20px;
    width:100%;
}

#songCount{
    color:#94a3b8;
    font-size:16px;
    font-weight:600;
    min-width:120px;
    text-align:center;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}
    .birthdayBtn{
    background:#1e293b;
    color:#fbbf24;
    font-weight:600;
    border:1px solid #334155;
}

.birthdayBtn.active{
    background:#334155;
    color:#fbbf24;
    border-color:#fbbf24;
    box-shadow:inset 0 0 0 1px #fbbf24;
}

#birthdayOverlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    opacity:0;
    pointer-events:none;

    transition:opacity .2s ease;

    z-index:95000;
}

#birthdayOverlay.open{
    opacity:1;
    pointer-events:auto;
}

#birthdayPanel{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);

    width:min(90%, 340px);

    background:#0f172a;
    border-radius:16px;

    padding:18px;
    box-sizing:border-box;

    display:none;

    z-index:95001;

    box-shadow:0 12px 32px rgba(0,0,0,.45);
}

#birthdayPanel.open{
    display:block;
}

#birthdayHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:16px;
}

.birthdayRow{
    display:flex;
    flex-direction:column;
    gap:6px;

    margin-bottom:12px;
}

.birthdayRow label{
    color:#94a3b8;
    font-size:13px;
}

.birthdayRow input{
    width:100%;
    box-sizing:border-box;

    padding:12px;

    border:none;
    border-radius:10px;

    background:#020617;
    color:#e2e8f0;

    font-size:20px;
    font-family:inherit;

    outline:none;
}

#birthdayRangeLabel{
    color:#fbbf24;
    font-size:14px;
    font-weight:600;

    margin:8px 0 14px;
}

#birthdayClear{
    width:100%;
    color:#fca5a5;
}
    .genreSelect{
    padding:6px 10px;

    border:1px solid #334155;
    border-radius:8px;

    background:#1e293b;
    color:#f87171;

    font-size:16px;
    font-weight:600;
    font-family:inherit;

    cursor:pointer;

    max-width:180px;
}

.genreSelect.active{
    background:#334155;
    color:#f87171;
    border-color:#f87171;
    box-shadow:inset 0 0 0 1px #f87171;
}
.autoScrollBtn{
    background:#1e293b;
    color:#38bdf8;
    font-weight:600;
    border:1px solid #334155;
}

.autoScrollBtn.active{
    background:#334155;
    color:#38bdf8;
    border-color:#38bdf8;
    box-shadow:inset 0 0 0 1px #38bdf8;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}
    .chip.decade-active{
    color:#fff;
    font-weight:600;
}
    .chip.unavailable{
    opacity:.28;
    filter:grayscale(1);
    pointer-events:none;
}
#setlistPanel{

    position:fixed;

    top:0;
    right:-100%;

    width:90%;
    max-width:500px;

    height:100%;

    background:#0f172a;

    z-index:99999;

    transition:right .25s ease;

    padding:20px;

    box-sizing:border-box;

    overflow-y:auto;
}

#setlistPanel.open{
    right:0;
}

#setlistHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#setlistSongs{
    display:flex;
    flex-direction:column;
    gap:8px;
}
#results{
    margin-top:var(--headerOffset, 220px);
    padding:20px;

    display:grid;
    gap:12px;
    grid-template-columns:repeat(2,1fr);
}

@media(max-width:600px){ #results{grid-template-columns:repeat(2,1fr);} }
@media(min-width:700px){ #results{grid-template-columns:repeat(3,1fr);} }
@media(min-width:1100px){ #results{grid-template-columns:repeat(4,1fr);} }

.card{
    background:#1e293b;
    border-radius:16px;
    padding:calc(14px * var(--scale));
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:calc(16px * var(--scale));
    user-select:none;
    
}
    .plusBtn{

    font-size:24px;
    font-weight:700;

    color:#38bdf8;

    cursor:pointer;

    padding-left:10px;

    user-select:none;
}
   .playedBtn{
    font-size:20px;
    font-weight:700;
    color:#38bdf8;
    cursor:pointer;
    padding:0 8px;
    user-select:none;
}

.playedBtn.active{
    color:#38bdf8;
}
.card.played{
    background:#475569 !important;
    opacity:0.45;
}
.title{
    font-size:calc(18px * var(--scale));
    font-weight:700;
}
.flagDisplay{
    font-size:calc(18px * var(--subScale));
    line-height:1;
    vertical-align:-1px;
    letter-spacing:1px;
}
.meta{
    font-size:calc(13px * var(--subScale));
    color:#94a3b8;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
    font-size:calc(15px * var(--scale));
}
    #alphaNav{
    position:fixed;
    left:4px;
    top:220px;
    bottom:20px;

    display:none;
    flex-direction:column;
    justify-content:space-between;

    z-index:999;
    user-select:none;
}
.setlistItem{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    touch-action:pan-y;
    transition:
        transform .18s ease,
        opacity .18s ease,
        background .18s ease;
}

.setlistItem.played{
    background:#475569 !important;
    opacity:.45;
}

.setlistItem.swiping{
    transition:none;
}

.setlistItem.dragging{
    opacity:.4;
}
  .placeMarkerItem{
    background:#1e293b;
    border:none;
}

.placeMarkerInput{
    flex:1;
    min-width:0;

    padding:0;

    border:none;
    border-radius:0;

    background:transparent;
    color:#e2e8f0;

    font-size:calc(18px * var(--scale));
    font-weight:700;
    font-family:inherit;

    outline:none;
}

.placeMarkerInput::placeholder{
    color:#94a3b8;
    font-weight:700;
}

.alphaLetter{
    font-size:11px;
    color:#94a3b8;
    cursor:pointer;
    padding:1px 3px;
    border-radius:4px;
}

.alphaLetter.active{
    font-size:16px;
    font-weight:700;
    color:#38bdf8;
}
    #settingsWrap{
    position:relative;
}

#settingsBtn{

    width:42px;
    height:42px;

    border-radius:50%;

    font-size:18px;
    letter-spacing:2px;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0;
}

#settingsMenu{

    position:absolute;

    top:48px;
    right:0;

    display:none;

    flex-direction:column;
    gap:6px;

    background:#0f172a;

    padding:10px;

    border-radius:12px;

    min-width:180px;

    box-shadow:
        0 8px 24px rgba(0,0,0,.45);

    z-index:999999;
}

#settingsMenu.open{
    display:flex;
}

#settingsMenu button{
    width:100%;
    text-align:left;
}
    .settingsSection{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-bottom:6px;
    border-bottom:1px solid #1e293b;
}

.settingsLabel{
    color:#94a3b8;
    font-size:13px;
}

.settingsRow{
    display:flex;
    gap:8px;
}

.settingsRow button{
    flex:1;
    text-align:center !important;
    font-size:18px;
}
    .speedRow{
    align-items:center;
}

#scrollSpeedValue{
    min-width:44px;
    text-align:center;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}
#notesDrawer{
    position:fixed;
    left:50%;
    bottom:0;

    width:min(94%, 720px);
    max-height:72vh;

    transform:translate(-50%, calc(100% - 32px));

    background:rgba(15,23,42,.68);
    border:1px solid rgba(148,163,184,.36);
    border-bottom:none;

    border-radius:14px 14px 0 0;

    z-index:90000;

    box-shadow:0 -4px 18px rgba(0,0,0,.28);

    overflow:hidden;

    opacity:.72;

    transition:
        transform .24s ease,
        opacity .22s ease,
        background .22s ease,
        border-color .22s ease,
        box-shadow .22s ease;
}

#notesDrawer.open{
    transform:translate(-50%, 0);

    background:#0f172a;
    border-color:#1e293b;

    opacity:1;

    box-shadow:0 -8px 24px rgba(0,0,0,.35);
}

#notesHandle{
    padding:5px 10px;

    text-align:center;

    color:#94a3b8;
    font-size:12px;
    font-weight:600;

    background:rgba(17,24,39,.45);

    cursor:pointer;
    user-select:none;

    -webkit-tap-highlight-color:transparent;
}

#notesHandle::after{
    content:" ↑";
    color:#38bdf8;
    opacity:.55;
}

#notesDrawer.open #notesHandle{
    padding:8px 14px;
    font-size:14px;
    font-weight:700;

    background:#111827;
}

#notesDrawer.open #notesHandle::after{
    content:" ↓";
    opacity:1;
}

#notesContent{
    display:none;

    padding:12px;
    box-sizing:border-box;
}

#notesDrawer.open #notesContent{
    display:block;
}

#notesHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:10px;

    color:#e2e8f0;
}
#notePresets{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:10px;
}

.notePreset{
    width:auto;
    padding:5px 8px;

    border-radius:999px;

    background:#1e293b;
    color:#38bdf8;

    font-size:13px;
    font-weight:600;

    white-space:nowrap;

    -webkit-tap-highlight-color:transparent;
}
#notesText{
    width:100%;
    height:140px;

    box-sizing:border-box;

    padding:12px;

    border:none;
    border-radius:12px;

    background:#020617;
    color:#e2e8f0;

    font-size:16px;
    font-family:inherit;

    resize:none;
    outline:none;

    touch-action:auto;
}

#clearNotesBtn{
    color:#fca5a5;
}
</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="leftPanel">

        <div id="chipContainer"></div>
        <div id="controls">
            
            <span style="color:#94a3b8;font-size:13px;margin-left:12px;">Sort by</span>

            <button id="sortArtist">Artist</button>
            <button id="sortTitle">Title</button>
            <button id="sortBpm">BPM</button>
            <button id="sortOrder">A-Z</button>
            <button id="sortRandom">Random</button>
            <button id="autoScrollBtn" class="autoScrollBtn">
    Auto Scroll
</button>

<button id="birthdayBtn" class="birthdayBtn">
    Birthday
</button>

<select id="genreSelect" class="genreSelect">
    <option value="">All Genres</option>
</select>
        </div>

    </div>
    
    <div id="statusRight">
    <div id="songCount"></div>
    <div id="clockBox"></div>

    <button id="openSetlist">+ Set List</button>
<div id="settingsWrap">

    <button id="settingsBtn">•••</button>

    <div id="settingsMenu">

    <div class="settingsSection">

        <div class="settingsRow">

        </div>
    </div>

    <div class="settingsLabel">Sub Text Size</div>

    </div>
</div>
        <div class="settingsSection">

    <div class="settingsRow speedRow">

<button id="addNewSong">

    <button id="addNewSong">

<button id="exportBackup">

        <button id="importBackup">

        </button>

        <button id="resetPlayed">

    </div>

</div>

>
</div>

</div>

</div> <!-- closes .header -->

<div id="alphaNav"></div>
<div id="results"></div>
    <div id="setlistOverlay"></div>
    <div id="birthdayOverlay"></div>

   <div id="setlistHeader">

">

</button>

<button id="addPlaceMarker">

</button>

</button>

    <button id="closeSetlist">
        ✕
    </button>
</div>
</div>

    <div id="setlistSongs"></div>

</div>

<div id="editOverlay"></div>

                display:flex;

            ">
                <button id="clearNotesBtn">
                    Clear
                </button>

                <button id="closeNotesBtn">
                    ✕
                </button>
            </div>
       </div>

<div id="notePresets">

<button type="button" class="notePreset">Birthday</button>
<button type="button" class="notePreset">Anniversary</button>
<button type="button" class="notePreset">Request</button>

<textarea
    id="notesText"
    placeholder="Things to remember..."
></textarea>
    </div>
</div>

<script>

let songs=[];
let currentQuery="";
let artistFilter = "";
let genreFilter = "";
let countryFilter = "";
let bpmFilter = null;
let yearFilter = "";

let birthdayBirthYear = null;
let birthdayStartYear = null;
let birthdayEndYear = null;
let birthdayInputLock = false;

let scale=1;
let subScale=1;
let autoScrollActive = false;
let autoScrollPaused = false;
let autoScrollFrame = null;
let lastAutoScrollTime = null;
let autoScrollSpeed =
    Number(
        localStorage.getItem("autoScrollSpeed") || 40
    );

    let editingSong = null;
let editingSongIndex = -1;
    const decadeOptions = [
    "30s",
    "40s",
    "50s",
    "60s",
    "70s",
    "80s",
    "90s",
    "00s",

];

const genreOptions = [

    "R&B"
];

const countryOptions = [
    "UK",

    "Germany",

    "Spain",

    "Scotland",
    "Wales",
    "Mexico",
    "New Zealand"
];

const booleanFields = [
    "Upbeat",
    "Favourites",
    "Dancefloor",
    "Sing-a-Long",
    "Happy",
    "Easy to Sing",
    "Romantic",
    "Showcase"
];

// SORT STATE
let sortKey = "artist";
let sortDirection = 1; // 1 = A-Z, -1 = Z-A
let randomMode = false;
let randomOrder = [];

function getSongId(song){

function autoScrollStep(timestamp){

    if(
        !autoScrollActive ||
        autoScrollPaused
    ){
        return;
    }

    if(lastAutoScrollTime === null){
        lastAutoScrollTime = timestamp;
    }

    const elapsed =
        timestamp - lastAutoScrollTime;

    lastAutoScrollTime = timestamp;

    window.scrollBy(
        0,
        autoScrollSpeed * elapsed / 1000
    );

    const atBottom =
        window.innerHeight + window.scrollY >=
        document.documentElement.scrollHeight - 2;

    if(atBottom){
        stopAutoScroll();
        return;
    }

    autoScrollFrame =
        requestAnimationFrame(autoScrollStep);
}

function startAutoScroll(){

    autoScrollActive = true;
    autoScrollPaused = false;
    lastAutoScrollTime = null;

    updateAutoScrollButton();

    autoScrollFrame =
        requestAnimationFrame(autoScrollStep);
}

function pauseAutoScroll(){

    if(!autoScrollActive) return;

    autoScrollPaused = true;

    if(autoScrollFrame){
        cancelAnimationFrame(autoScrollFrame);
    }

    autoScrollFrame = null;
    lastAutoScrollTime = null;

    updateAutoScrollButton();
}

function resumeAutoScroll(){

    if(

    ){
        return;
    }

    autoScrollPaused = false;
    lastAutoScrollTime = null;

    updateAutoScrollButton();

    autoScrollFrame =
        requestAnimationFrame(autoScrollStep);

function passesFilters(song){

    );

            const aOrder =
                orderMap.has(aId)
                ? orderMap.get(aId)
                : Number.MAX_SAFE_INTEGER;

            const bOrder =
                orderMap.has(bId)
                ? orderMap.get(bId)
                : Number.MAX_SAFE_INTEGER;

            return aOrder - bOrder;
        });
    }

    if(d.includes("1960") || d.includes("60s")) return "#695b30";
    if(d.includes("1970") || d.includes("70s")) return "#543424";
    if(d.includes("1980") || d.includes("80s")) return "#2a0e02";
    if(d.includes("1990") || d.includes("90s")) return "#29331e";

        return String(text || "")
            .replace(/[‘’]/g, "'")
            .replace(/[“”]/g, '"')
            .replace(/–/g, "-")
            .replace(/—/g, "-")
            .replace(/…/g, "...")

    function escapePdfText(text){

        return cleanPdfText(text)
            .replace(/\\/g, "\\\\")

            cleanPdfText(text).split(" ");

        const lines = [];

        words.forEach(word => {

            const test =
                line
                ? line + " " + word
                : word;

            if(test.length > maxChars){

                if(line){
                    lines.push(line);
                }

                line = word;

            }else{

                line = test;
            }
        });

        if(line){
            lines.push(line);
        }

        );
    });

    const allLines = [];

    rawLines.forEach(line => {

        wrapLine(line, 70).forEach(wrapped => {
            allLines.push(wrapped);
        });

        allLines.push("");
    });

    const pages = [];
    const linesPerPage = 36;

    for(
        let i = 0;
        i < allLines.length;
        i += linesPerPage
    ){
        pages.push(
            allLines.slice(
                i,
                i + linesPerPage
            )
        );
    }

    if(pages.length === 0){
        pages.push([]);
    }

    const objects = [];

    function addObject(content){

        objects.push(content);

        return objects.length;
    }

    const catalogObj = addObject("");
    const pagesObj = addObject("");

    const fontObj = addObject(
        "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>"
    );

    const pageRefs = [];

    pages.forEach((pageLines, pageIndex) => {

        const streamParts = [];

        streamParts.push("BT");
        streamParts.push("/F1 22 Tf");
        streamParts.push("50 790 Td");
        streamParts.push("(Set List) Tj");

        streamParts.push("/F1 10 Tf");
        streamParts.push("0 -24 Td");
        streamParts.push(`(${escapePdfText(displayStamp)}) Tj`);

        if(pages.length > 1){

            streamParts.push("0 -16 Td");
            streamParts.push(
                `(Page ${pageIndex + 1} of ${pages.length}) Tj`
            );

            streamParts.push("0 -30 Td");

        }else{

            streamParts.push("0 -38 Td");
        }

        streamParts.push("/F1 12 Tf");

        pageLines.forEach((line, lineIndex) => {

            if(lineIndex > 0){
                streamParts.push("0 -18 Td");
            }

            streamParts.push(
                `(${escapePdfText(line)}) Tj`
            );
        });

        streamParts.push("ET");

        const stream =
            streamParts.join("\n");

        const contentObj = addObject(
            "<< /Length " + stream.length + " >>\n" +
            "stream\n" +
            stream + "\n" +
            "endstream"
        );

        const pageObj = addObject(
            "<< /Type /Page " +
            "/Parent " + pagesObj + " 0 R " +
            "/MediaBox [0 0 595 842] " +
            "/Resources << /Font << /F1 " + fontObj + " 0 R >> >> " +
            "/Contents " + contentObj + " 0 R " +
            ">>"
        );

        pageRefs.push(
            pageObj + " 0 R"
        );
    });

    objects[catalogObj - 1] =
        "<< /Type /Catalog /Pages " + pagesObj + " 0 R >>";

    objects[pagesObj - 1] =
        "<< /Type /Pages /Kids [" +
        pageRefs.join(" ") +
        "] /Count " +
        pages.length +
        " >>";

    let pdf = "%PDF-1.4\n";
    const offsets = [0];

    objects.forEach((object, index) => {

        offsets.push(pdf.length);

        pdf += `${index + 1} 0 obj\n`;
        pdf += object + "\n";
        pdf += "endobj\n";
    });

    const xrefStart =
        pdf.length;

    pdf += "xref\n";
    pdf += "0 " + (objects.length + 1) + "\n";
    pdf += "0000000000 65535 f \n";

    for(let i = 1; i < offsets.length; i++){

        pdf +=
            String(offsets[i]).padStart(10, "0") +
            " 00000 n \n";
    }

    pdf += "trailer\n";
    pdf +=
        "<< /Size " +
        (objects.length + 1) +
        " /Root " +
        catalogObj +
        " 0 R >>\n";

    pdf += "startxref\n";
    pdf += xrefStart + "\n";
    pdf += "%%EOF";

    const blob =
        new Blob(
            [pdf],
            { type:"application/pdf" }
        );

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

   a.download =
    `SetList_${fileStamp}.pdf`;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    setTimeout(() => {
        URL.revokeObjectURL(a.href);
    }, 1000);
};

 function addNotePreset(text){

    const existing =
        notesText.value;

    const needsSpace =
        existing.length > 0 &&
        !existing.endsWith(" ") &&
        !existing.endsWith("\n");

    const prefix =
        needsSpace
        ? " "
        : "";

    const insert =
        text + ": ";

    notesText.value =
        existing + prefix + insert;

    localStorage.setItem(
        "songFinderNotes",
        notesText.value
    );

    notesText.focus();

    notesText.selectionStart =
        notesText.value.length;

    notesText.selectionEnd =
        notesText.value.length;
}
