<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#0f172a;
    z-index:10;
}

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:26px;
    border:none;
    border-radius:14px;
    outline:none;
}

#info{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}

#filters{
    margin-top:16px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    font-size:14px;
}

#fontControls{
    margin-top:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

button{
    padding:6px 12px;
    font-size:18px;
    border-radius:8px;
    border:none;
    background:#1e293b;
    color:#e2e8f0;
}

/* GRID LAYOUT */
#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns: repeat(1, 1fr);
}

/* 2 columns portrait */
@media (min-width: 600px){
    #results{
        grid-template-columns: repeat(2, 1fr);
    }
}

/* 3 columns landscape */
@media (min-width: 1000px){
    #results{
        grid-template-columns: repeat(3, 1fr);
    }
}

.result{
    background:#1e293b;
    border-radius:16px;
    padding:16px;
    margin-bottom:0;

    font-size: var(--card-font-size, 16px);
    height: 100%;
    display: flex;
    flex-direction: column;
}

.title{
    font-size: calc(var(--card-font-size, 16px) + 4px);
    font-weight:700;
}

.meta{
    margin-top:6px;
    color:#94a3b8;
    font-size: calc(var(--card-font-size, 16px) - 2px);
}

a{
    color:#38bdf8;
    font-weight:600;
    text-decoration:none;
}

mark{
    background:#38bdf8;
    color:black;
    padding:1px 3px;
    border-radius:3px;
}

</style>
</head>

<body>

<div class="header">

<input id="search" placeholder="Search songs, artist, year, genre...">

<div id="info">Loading songs...</div>

<div id="fontControls">
    <button id="fontMinus">−</button>
    <button id="fontPlus">+</button>
    <span style="color:#94a3b8;font-size:14px;">Text size</span>
</div>

<div id="filters">
<label><input type="checkbox" class="tag-filter" value="Upbeat"> Upbeat</label>
<label><input type="checkbox" class="tag-filter" value="Favourites"> Favourites</label>
<label><input type="checkbox" class="tag-filter" value="Dancefloor"> Dancefloor</label>
<label><input type="checkbox" class="tag-filter" value="Sing-a-Long"> Sing-a-Long</label>
<label><input type="checkbox" class="tag-filter" value="Happy"> Happy</label>
<label><input type="checkbox" class="tag-filter" value="Easy To Sing"> Easy To Sing</label>
<label><input type="checkbox" class="tag-filter" value="Romantic"> Romantic</label>
<label><input type="checkbox" class="tag-filter" value="Showcase"> Showcase</label>
</div>

</div>

<div id="results"></div>

<script>

let songs = [];
let currentQuery = "";
let fontSize = 16;

function applyFontSize(){
    document.documentElement.style.setProperty(
        "--card-font-size",
        fontSize + "px"
    );
}

function normalize(t){
    return (t || "").toString().toLowerCase();
}

function isNumeric(q){
    return /^\d+$/.test(q);
}

function fuzzyMatch(text, query){
    let t = 0;
    let q = 0;
    while(t < text.length && q < query.length){
        if(text[t] === query[q]) q++;
        t++;
    }
    return q === query.length;
}

function songMatches(song, query){
    query = normalize(query).trim();
    if(!query) return true;

    const text = normalize(Object.values(song).join(" "));

    if(isNumeric(query)){
        return new RegExp(`\\b${query}\\b`).test(text);
    }

    if(query.includes(" ")){
        return query.split(/\s+/).every(w => text.includes(w));
    }

    return fuzzyMatch(text, query);
}

function getActiveFilters(){
    return Array.from(document.querySelectorAll(".tag-filter:checked")).map(cb => cb.value.trim());
}

function passesFilters(song){
    const filters = getActiveFilters();
    if(filters.length === 0) return true;

    return filters.every(f => {
        const v = song[f];
        if(v === true) return true;
        const s = normalize(v);
        return s === "true" || s === "yes" || s === "1";
    });
}

function renderSongs(list){
    const results = document.getElementById("results");
    results.innerHTML = "";

    list.forEach(song => {
        const div = document.createElement("div");
        div.className = "result";

        const link = song.Link || song.link || song.LINK || "";
        const finalLink = link
            ? link
            : ("onsong://open/songs?song=" + encodeURIComponent(song["SONG NAME"] || ""));

        div.innerHTML = `
            <div class="title">${song["SONG NAME"] || ""}</div>
            <div>${song["ARTIST"] || ""}</div>
            <div class="meta">
                ${song.Year || ""} ${song.Decade || ""} ${song.Genre || ""} ${song.Tempo || ""}
            </div>
            <div style="margin-top:10px;">
                <a href="${finalLink}" target="_blank" rel="noopener">Open</a>
            </div>
        `;

        results.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", e => {
    currentQuery = e.target.value.trim();
    const filtered = songs.filter(s => songMatches(s, currentQuery) && passesFilters(s));
    renderSongs(filtered);
});

document.querySelectorAll(".tag-filter").forEach(cb => {
    cb.addEventListener("change", () => {
        const filtered = songs.filter(s => songMatches(s, currentQuery) && passesFilters(s));
        renderSongs(filtered);
    });
});

document.getElementById("fontPlus").addEventListener("click", () => {
    fontSize = Math.min(fontSize + 2, 28);
    applyFontSize();
});

document.getElementById("fontMinus").addEventListener("click", () => {
    fontSize = Math.max(fontSize - 2, 10);
    applyFontSize();
});

applyFontSize();

async function loadSongs(){
    try{
        const res = await fetch("songs.json");
        songs = await res.json();
        document.getElementById("info").innerText = songs.length + " songs loaded";
        renderSongs(songs);
    }catch(err){
        document.getElementById("info").innerText = "Failed to load songs.json";
    }
}

loadSongs();

</script>

</body>
</html>
