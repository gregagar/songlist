<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>

:root{
    --scale:1;
}

html, body{
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    touch-action:manipulation;
    overflow-x:hidden;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#0f172a;
    z-index:10;
}

#searchWrap{
    position:relative;
}

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
    font-size:18px;
    user-select:none;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
}

#clockBox{
    font-size:34px;
    font-weight:800;
    color:#e2e8f0;
    min-width:140px;
    text-align:right;
    letter-spacing:1px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}

#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns:repeat(2,1fr);
}

@media(max-width:600px){
    #results{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:700px){
    #results{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1100px){
    #results{grid-template-columns:repeat(4,1fr);}
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:calc(14px * var(--scale));
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:calc(16px * var(--scale));
    user-select:none;
}

.title{
    font-size:calc(18px * var(--scale));
    font-weight:700;
}

.meta{
    font-size:calc(13px * var(--scale));
    color:#94a3b8;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
    font-size:calc(15px * var(--scale));
}

</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="controls">
        <button id="fontMinus">−</button>
        <button id="fontPlus">+</button>
        <span id="fontLabel">Text size</span>
        <button id="fsBtn">⛶</button>
        <button id="returnBtn">↩</button>
    </div>

    <div id="clockBox"></div>

</div>

<div id="chipContainer"></div>

</div>

<div id="results"></div>

<script>

let songs=[];
let currentQuery="";
let scale=1;
let filtered=[];

const filters=["Upbeat","Favourites","Dancefloor","Sing-a-Long","Happy","Easy To Sing","Romantic","Showcase"];
const activeFilters=new Set();

function pad(n){return n.toString().padStart(2,'0');}

function updateClock(){
    const now=new Date();
    document.getElementById("clockBox").innerText=
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

function applyScale(){
    document.documentElement.style.setProperty("--scale",scale);
}

function normalize(t){return (t||"").toLowerCase();}

function songMatches(song,q){
    q=normalize(q.trim());
    if(!q) return true;
    const text=normalize(Object.values(song).join(" "));
    if(/^\d+$/.test(q)) return new RegExp(`\\b${q}\\b`).test(text);
    if(q.includes(" ")) return q.split(/\s+/).every(w=>text.includes(w));
    return text.includes(q);
}

function passesFilters(song){
    if(activeFilters.size===0) return true;
    const map={};
    Object.keys(song).forEach(k=>map[k.trim().toLowerCase()]=song[k]);
    return [...activeFilters].every(f=>{
        const v=map[f.toLowerCase()];
        const s=(v||"").toString().toLowerCase();
        return v===true||s=="true"||s=="1"||s=="yes";
    });
}

function buildChips(){
    const c=document.getElementById("chipContainer");
    c.innerHTML="";
    filters.forEach(f=>{
        const d=document.createElement("div");
        d.className="chip";
        d.innerText=f;
        d.onclick=()=>{
            if(activeFilters.has(f)) activeFilters.delete(f);
            else activeFilters.add(f);
            d.classList.toggle("active");
            render();
        };
        c.appendChild(d);
    });
}

function render(){
    const r=document.getElementById("results");
    r.innerHTML="";

    filtered=songs.filter(s=>songMatches(s,currentQuery)&&passesFilters(s));

    filtered.forEach(song=>{
        const div=document.createElement("div");
        div.className="card";

        const link=song.Link||song.link||"";
        const linkHTML=link.trim()?`<a href="${link}" target="_blank">Open</a>`:"";

        div.innerHTML=`
            <div class="title">${song["SONG NAME"]||""}</div>
            <div>${song["ARTIST"]||""}</div>
            <div class="meta">${song.Year||""} ${song.Genre||""}</div>
            <div>${linkHTML}</div>
        `;

        r.appendChild(div);
    });

    updateClock();
}

// EVENTS

document.getElementById("search").oninput=e=>{currentQuery=e.target.value;render();};

document.getElementById("clearSearch").onclick=()=>{
    document.getElementById("search").value="";
    currentQuery="";
    render();
};

document.getElementById("fontPlus").onclick=()=>{scale=Math.min(2,scale+0.1);applyScale();};

document.getElementById("fontMinus").onclick=()=>{scale=Math.max(0.6,scale-0.1);applyScale();};

// FULLSCREEN

document.getElementById("fsBtn").onclick=async()=>{
    try{
        await document.documentElement.requestFullscreen();
        screen.orientation?.lock?.("landscape");
    }catch(e){}
};

// RETURN

document.getElementById("returnBtn").onclick=()=>{
    const cards=document.querySelectorAll(".card");
    if(cards[0]) cards[0].scrollIntoView({behavior:"smooth",block:"center"});
};

async function load(){
    try{
        songs=await (await fetch("songs.json")).json();
    }catch(e){
        songs=JSON.parse(localStorage.getItem("cache")||"[]");
    }
    buildChips();
    render();
}

setInterval(updateClock,1000);

load();
applyScale();
updateClock();

</script>

</body>
</html>
