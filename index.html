<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{ --scale:1; }

html, body{
    margin:0;
    background:#000000;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    touch-action:manipulation;
    overflow-x:hidden;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#000000;
    z-index:10;
}


#leftPanel{
    display:flex;
    flex-direction:column;
    gap:10px;
}
#statusRight{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    min-width:140px;
}
#searchWrap{ position:relative; }

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px 52px 18px 18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);

    width:38px;
    height:38px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    cursor:pointer;
    user-select:none;

    color:#94a3b8;
    font-size:18px;

    z-index:20;

    -webkit-tap-highlight-color: transparent;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
}

#clockBox{
    font-size:34px;
    font-weight:800;
    color:#e2e8f0;
    min-width:140px;
    text-align:right;
    letter-spacing:1px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
}
    #setlistOverlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    opacity:0;
    pointer-events:none;

    transition:opacity .25s ease;

    z-index:99998;
}

#setlistOverlay.open{

    opacity:1;
    pointer-events:auto;
}
    #editPanel{
    position:fixed;
    top:0;
    right:-100%;
    width:90%;
    max-width:600px;
    height:100%;
    background:#0f172a;
    z-index:100000;
    transition:right .25s ease;
    overflow-y:auto;
    padding:20px;
    box-sizing:border-box;
}

#editPanel.open{
    right:0;
}

#editHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#editForm{
    display:flex;
    flex-direction:column;
    gap:12px;
}

#editForm label{
    font-size:13px;
    color:#94a3b8;
}

#editForm input,
#editForm select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}

#saveSongBtn{
    margin-top:20px;
    width:100%;
}

#songCount{
    color:#94a3b8;
    font-size:16px;
    font-weight:600;
    min-width:120px;
    text-align:center;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}
    .chip.decade-active{
    color:#fff;
    font-weight:600;
}
#setlistPanel{

    position:fixed;

    top:0;
    right:-100%;

    width:90%;
    max-width:500px;

    height:100%;

    background:#0f172a;

    z-index:99999;

    transition:right .25s ease;

    padding:20px;

    box-sizing:border-box;

    overflow-y:auto;
}

#setlistPanel.open{
    right:0;
}

#setlistHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#setlistSongs{
    display:flex;
    flex-direction:column;
    gap:8px;
}
#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns:repeat(2,1fr);
}

@media(max-width:600px){ #results{grid-template-columns:repeat(2,1fr);} }
@media(min-width:700px){ #results{grid-template-columns:repeat(3,1fr);} }
@media(min-width:1100px){ #results{grid-template-columns:repeat(4,1fr);} }

.card{
    background:#1e293b;
    border-radius:16px;
    padding:calc(14px * var(--scale));
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:calc(16px * var(--scale));
    user-select:none;
    
}
    .plusBtn{

    font-size:24px;
    font-weight:700;

    color:#38bdf8;

    cursor:pointer;

    padding-left:10px;

    user-select:none;
}
    .playedBtn{
    font-size:20px;
    font-weight:700;
    color:#94a3b8;
    cursor:pointer;
    padding:0 8px;
    user-select:none;
}

.playedBtn.active{
    color:#38bdf8;
}
.card.played{
    background:#475569 !important;
    opacity:0.45;
}
.title{
    font-size:calc(18px * var(--scale));
    font-weight:700;
}

.meta{
    font-size:calc(13px * var(--scale));
    color:#94a3b8;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
    font-size:calc(15px * var(--scale));
}
    #alphaNav{
    position:fixed;
    left:4px;
    top:220px;
    bottom:20px;

    display:none;
    flex-direction:column;
    justify-content:space-between;

    z-index:999;
    user-select:none;
}
    .setlistItem{

    background:#1e293b;

    padding:12px;

    border-radius:10px;

    margin-bottom:8px;
}

.setlistItem.dragging{
    opacity:.4;
}

.alphaLetter{
    font-size:11px;
    color:#94a3b8;
    cursor:pointer;
    padding:1px 3px;
    border-radius:4px;
}

.alphaLetter.active{
    font-size:16px;
    font-weight:700;
    color:#38bdf8;
}
    #settingsWrap{
    position:relative;
}

#settingsBtn{

    width:42px;
    height:42px;

    border-radius:50%;

    font-size:18px;
    letter-spacing:2px;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0;
}

#settingsMenu{

    position:absolute;

    top:48px;
    right:0;

    display:none;

    flex-direction:column;
    gap:6px;

    background:#0f172a;

    padding:10px;

    border-radius:12px;

    min-width:180px;

    box-shadow:
        0 8px 24px rgba(0,0,0,.45);

    z-index:999999;
}

#settingsMenu.open{
    display:flex;
}

#settingsMenu button{
    width:100%;
    text-align:left;
}
</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="leftPanel">

        <div id="chipContainer"></div>
        <div id="controls">
            <span id="fontLabel">Text size</span>
            <button id="fontMinus">−</button>
            <button id="fontPlus">+</button>

            <button id="sortArtist">Artist</button>

    <div id="statusRight">
    <div id="songCount"></div>

<div id="settingsWrap">

    <div id="settingsMenu">

        <button id="exportBackup">

        </button>

        <button id="importBackup">

        </button>

</div>
        <input
    type="file"
    id="importFile"
    accept=".json"
    style="display:none;"
>
</div>

</div>

<div id="alphaNav"></div>
<div id="results"></div>
    <div id="setlistOverlay"></div>
    <div id="setlistPanel">

    <div id="setlistHeader">
        <span>
    Set List
    (<span id="setlistCount">0</span>)
</span>
        <button id="closeSetlist">✕</button>
    </div>

    <div id="setlistSongs"></div>

</div>
<div id="editPanel">

    <div id="editHeader">
        <h2>Edit Song</h2>
        <button id="closeEditPanel">✕</button>
    </div>

    <div id="editForm"></div>

    <button id="saveSongBtn">Save Changes</button>

</div>
<script>

let songs=[];
let currentQuery="";
let artistFilter = "";
let genreFilter = "";
let countryFilter = "";
let bpmFilter = null;
let yearFilter = "";
let scale=1;

    let editingSong = null;
let editingSongIndex = -1;
    const decadeOptions = [
    "30s",
    "40s",
    "50s",
    "60s",
    "70s",
    "80s",
    "90s",
    "00s",
    "10s",
    "20s"
];

const genreOptions = [
    "Rock",
    "Pop",
    "Country",
    "Reggae",
    "Soul",
    "Jazz",
    "Folk",
    "Dance",
    "Disco",
    "R&B"
];

const countryOptions = [
    "UK",
    "USA",
    "Canada",
    "Australia",
    "Ireland",
    "Sweden",
    "Germany",
    "France",
    "Italy",
    "Spain",
    "Jamaica",
    "Scotland",
    "Wales",
    "Mexico",
    "New Zealand"
];

const booleanFields = [
    "Upbeat",
    "Favourites",
    "Dancefloor",
    "Sing-a-Long",
    "Happy",
    "Easy to Sing",
    "Romantic",
    "Showcase"
];

// SORT STATE
let sortKey = "artist";
let sortDirection = 1; // 1 = A-Z, -1 = Z-A
let randomMode = false;
let randomOrder = [];

function getSongId(song){
    return (
        (song["SONG NAME"] || "") +
        "|" +
        (song["ARTIST"] || "")
    );
}
const filters=[
    "Favourites",
    "Upbeat",
    "Dancefloor",
    "Sing-a-Long",
    "Happy",
    "Easy To Sing",
    "Romantic",
    "Showcase"
];

const decadeFilters=[
    "60s",
    "70s",
    "80s",
    "90s",
    "00s",
    "10s",
    "Newer"
];

const activeFilters=new Set();
const activeDecades=new Set();
const playedSongs = new Set();
let draggedSongId = null;
let setlist =
JSON.parse(
    localStorage.getItem("setlist") || "[]"
);
function saveSetlist(){

    localStorage.setItem(
        "setlist",
        JSON.stringify(setlist)
    );
}
function pad(n){return n.toString().padStart(2,'0');}

function updateClock(){
    const now=new Date();
    document.getElementById("clockBox").innerText=
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

function applyScale(){
    document.documentElement.style.setProperty("--scale",scale);
}

function updateCount(count){
    document.getElementById("songCount").innerText = count + " songs";
}

function normalize(t){return (t||"").toLowerCase();}

function songMatches(song,q){

    q = normalize(q.trim());

    if(q){

        const text =
            normalize(
                Object.values(song).join(" ")
            );

        if(/^\d+$/.test(q)){
            if(!new RegExp(`\\b${q}\\b`).test(text)){
                return false;
            }
        }
        else if(q.includes(" ")){
            if(
                !q.split(/\s+/)
                .every(w=>text.includes(w))
            ){
                return false;
            }
        }
        else{
            if(!text.includes(q)){
                return false;
            }
        }
    }

    if(
        artistFilter &&
        song["ARTIST"] !== artistFilter
    ){
        return false;
    }

    if(
        genreFilter &&
        song.Genre !== genreFilter
    ){
        return false;
    }

    if(
        countryFilter &&
        song["Country of Origin"] !== countryFilter
    ){
        return false;
    }
if(
    yearFilter &&
    String(song.Year) !== yearFilter
){
    return false;
}
    if(
        bpmFilter !== null &&
        Math.abs(
            Number(song.Tempo || 0) -
            bpmFilter
        ) > 10
    ){
        return false;
    }

    return true;
}

function passesFilters(song){

    const map={};
    Object.keys(song).forEach(
        k=>map[k.trim().toLowerCase()]=song[k]
    );

    const normalFiltersPass =
        [...activeFilters].every(f=>{
            const v=map[f.toLowerCase()];
            const s=(v||"").toString().toLowerCase();

            return (
                v===true ||
                s==="true" ||
                s==="1" ||
                s==="yes"
            );
        });

    if(!normalFiltersPass) return false;

    if(activeDecades.size===0) return true;

    const decade=(song.Decade||"").toString().trim();
    const year=parseInt(song.Year,10);

    return (
        activeDecades.has(decade) ||
        (
            activeDecades.has("Newer") &&
            year>=2020 &&
            year<=2026
        )
    );
}

function sortSongs(arr){

    if(randomMode){

        const orderMap = new Map(
            randomOrder.map((id,index)=>[
                id,
                index
            ])
        );

        return [...arr].sort((a,b)=>{

            const aId = getSongId(a);
            const bId = getSongId(b);

            const aOrder =
                orderMap.has(aId)
                ? orderMap.get(aId)
                : Number.MAX_SAFE_INTEGER;

            const bOrder =
                orderMap.has(bId)
                ? orderMap.get(bId)
                : Number.MAX_SAFE_INTEGER;

            return aOrder - bOrder;
        });
    }

    return [...arr].sort((a,b)=>{

        let x = "";
        let y = "";

        switch(sortKey){

            case "artist":
                x = String(a["ARTIST"] || "").toLowerCase();
                y = String(b["ARTIST"] || "").toLowerCase();
                break;

            case "title":
                x = String(a["SONG NAME"] || "").toLowerCase();
                y = String(b["SONG NAME"] || "").toLowerCase();
                break;

            case "bpm":
                x = Number(a["Tempo"] || 0);
                y = Number(b["Tempo"] || 0);
                break;
        }

        if(x > y) return sortDirection;
        if(x < y) return -sortDirection;
        return 0;
    });
}
function positionAlphabet(){

    const nav = document.getElementById("alphaNav");

    if(window.scrollY < 150){

        const firstCard =
            document.querySelector(".card");

        if(firstCard){
            nav.style.top =
                `${firstCard.getBoundingClientRect().top}px`;
        }

    }else{

        nav.style.top = "20px";
    }
}
function buildChips(){

    const c=document.getElementById("chipContainer");
    c.innerHTML="";
    // Existing filters
    filters.forEach(f=>{

        const d=document.createElement("div");
        d.className="chip";
        d.innerText=f;

        d.onclick=()=>{

            if(activeFilters.has(f))
                activeFilters.delete(f);
            else
                activeFilters.add(f);

            d.classList.toggle("active");

            render();
        };

       c.appendChild(d);
    });
    const spacer = document.createElement("div");
spacer.style.flexBasis = "100%";
c.appendChild(spacer);

    // Decade filters
    decadeFilters.forEach(decade=>{

        const d=document.createElement("div");
        d.className="chip";
        d.innerText=decade;

        d.onclick=()=>{

            if(activeDecades.has(decade)){

    activeDecades.delete(decade);

    d.classList.remove("decade-active");
    d.style.background = "";

}else{

    activeDecades.add(decade);

    d.classList.add("decade-active");
    d.style.background = getDecadeColor(decade);
}

            render();
        };

        c.appendChild(d);
    });

    // Clear button
    const clear=document.createElement("div");
    clear.className="chip";
    clear.innerText="✕";

    clear.onclick=()=>{

    activeFilters.clear();
    activeDecades.clear();

    artistFilter = "";
    genreFilter = "";
    countryFilter = "";
    yearFilter = "";
    bpmFilter = null;

    currentQuery = "";
    document.getElementById("search").value = "";

    document
        .querySelectorAll(".chip")
        .forEach(chip=>{
            chip.classList.remove("active");
            chip.classList.remove("decade-active");
            chip.style.background = "";
        });

    render();
    };

   c.appendChild(clear);
}

function getDecadeColor(decade){
    const d=(decade||"").toString().toLowerCase().trim();

    if(d.includes("1920") || d.includes("20s")) return "#212121";
    if(d.includes("1930") || d.includes("30s")) return "#331f1e";
    if(d.includes("1940") || d.includes("40s")) return "#3e5347";
    if(d.includes("1950") || d.includes("50s")) return "#211708";
    if(d.includes("1960") || d.includes("60s")) return "#695b30";
    if(d.includes("1970") || d.includes("70s")) return "#543424";
    if(d.includes("1980") || d.includes("80s")) return "#2a0e02";
    if(d.includes("1990") || d.includes("90s")) return "#29331e";
    if(d.includes("2000") || d.includes("00s")) return "#405674";
    if(d.includes("2010") || d.includes("10s")) return "#1e2533";
    if(d.includes("2020")) return "#1c0f1a";

    return "#1e293b";
}

function getFlag(country){
    if(!country) return "";

const flags = {
    "united kingdom":"🇬🇧",
    "uk":"🇬🇧",
    "england":"🇬🇧",
    "usa":"🇺🇸",
    "united states":"🇺🇸",
    "canada":"🇨🇦",
    "france":"🇫🇷",
    "germany":"🇩🇪",
    "italy":"🇮🇹",
    "spain":"🇪🇸",
    "ireland":"🇮🇪",
    "sweden":"🇸🇪",
    "australia":"🇦🇺",
    "new zealand":"🇳🇿",
    "japan":"🇯🇵",
    "jamaica":"🇯🇲",
    "scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
    "wales":"🏴󠁧󠁢󠁷󠁬󠁳󠁿",
    "mexico":"🇲🇽"
};

    return flags[country.toString().toLowerCase()] || "";
}
function buildAlphabet(filtered){

    const nav=document.getElementById("alphaNav");

    if(
        sortKey!=="artist" &&
        sortKey!=="title"
    ){
        nav.style.display="none";
        return;
    }

    nav.style.display="flex";
    nav.innerHTML="";

    const letters = [
    "#",
    ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ"
];

    letters.forEach(letter=>{

        const d=document.createElement("div");
        d.className="alphaLetter";
        d.innerText=letter;

        d.onclick=()=>{

            const target=[...document.querySelectorAll(".card")]
    .find(card =>
        card.dataset.letter === letter &&
        card.offsetParent !== null
    );
            if(target){
                const y =
    target.getBoundingClientRect().top +
    window.scrollY -
    10;

window.scrollTo({
    top:y,
    behavior:"auto"
});
            }
        };

        nav.appendChild(d);
    });
}
    function moveSetlistItem(
    draggedId,
    targetId
){

    const from =
        setlist.indexOf(draggedId);

    const to =
        setlist.indexOf(targetId);

    if(
        from === -1 ||
        to === -1
    ) return;

    const item =
        setlist.splice(from,1)[0];

    setlist.splice(to,0,item);

    saveSetlist();

    renderSetlist();
}
    function renderSetlist(){

    const container =
        document.getElementById("setlistSongs");

    if(!container) return;

    container.innerHTML="";
        const count =
    document.getElementById("setlistCount");

if(count){
    count.innerText =
        setlist.length;
}

    setlist.forEach(songId=>{

        const song = songs.find(s=>

            (s["SONG NAME"]||"") +
            "|" +
            (s["ARTIST"]||"")
            === songId
        );

        if(!song) return;

        const div =
            document.createElement("div");
        div.draggable = true;
div.dataset.songid = songId;

        div.style.background="#1e293b";
        div.style.padding="10px";
        div.style.borderRadius="10px";

        const link = song.Link || song.link || "";
const wiki = song.Wiki || song.wiki || "";

div.innerHTML=`

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
">

    <div style="flex:1;">

        <strong>${song["SONG NAME"]}</strong>
        <br>
        ${song["ARTIST"]}

        <div style="
            margin-top:8px;
            display:flex;
            gap:12px;
        ">

            ${
                link
                ? `<a href="${link}" target="_blank">Open</a>`
                : ""
            }

            ${
                wiki
                ? `<a href="${wiki}" target="_blank">Wiki</a>`
                : ""
            }

        </div>

    </div>

    <button
        class="removeSetSong"
        data-id="${songId}"
    >
        ✕
    </button>

</div>

`;
        const removeBtn =
    div.querySelector(".removeSetSong");

removeBtn.onclick=()=>{

    setlist =
        setlist.filter(
            id => id !== songId
        );

    saveSetlist();

    render();
    renderSetlist();
};
div.addEventListener("dragstart",()=>{

    div.classList.add("dragging");

    draggedSongId = songId;
});

div.addEventListener("dragend",()=>{

    div.classList.remove("dragging");
});
        div.addEventListener(
    "dragover",
    e=>{
        e.preventDefault();
    }
);

div.addEventListener(
    "drop",
    e=>{

        e.preventDefault();

function openEditPanel(song){

    editingSong = song;
    editingSongIndex = songs.indexOf(song);

    const form =
        document.getElementById("editForm");

    form.innerHTML = `
        <datalist id="genreList">
            ${genreOptions.map(g =>
                `<option value="${g}">`
            ).join("")}
        </datalist>

        <datalist id="countryList">
            ${countryOptions.map(c =>
                `<option value="${c}">`
            ).join("")}
        </datalist>
    `;

    Object.keys(song).forEach(key=>{

        const value = song[key];

        const row =
            document.createElement("div");

        let html =
            `<label>${key}</label>`;

        if(booleanFields.includes(key)){

            html += `
                <input
                    type="checkbox"
                    data-field="${key}"
                    ${value ? "checked" : ""}
                >
            `;
        }

        else if(key === "Decade"){

            html += `
                <select data-field="${key}">
                    ${decadeOptions.map(opt => `
                        <option
                            value="${opt}"
                            ${opt === value ? "selected" : ""}
                        >
                            ${opt}
                        </option>
                    `).join("")}
                </select>
            `;
        }

        else if(key === "Genre"){

            html += `
                <input
                    list="genreList"
                    data-field="${key}"
                    value="${value || ""}"
                >
            `;
        }

        else if(key === "Country of Origin"){

            html += `
                <input
                    list="countryList"
                    data-field="${key}"
                    value="${value || ""}"
                >
            `;
        }

        else{

            html += `
                <input
                    data-field="${key}"
                    value="${value ?? ""}"
                >
            `;
        }

        row.innerHTML = html;

        form.appendChild(row);
    });

    document
        .getElementById("editPanel")
        .classList.add("open");
}

.onclick = () => {

    const data = JSON.stringify(
    JSON.parse(
        localStorage.getItem("songsData")
    ),
    null,
    2
);

    if(!data){
        alert("No song data found.");
        return;
    }

    const blob = new Blob(
        [data],
        { type:"application/json" }
    );

    const a =
        document.createElement("a");

    const now = new Date();

    const stamp =
        now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        `SongBackup_${stamp}.json`;

    a.click();

    URL.revokeObjectURL(a.href);
};

        const file =
            e.target.files[0];

        if(!file) return;

        try{

            const text =
                await file.text();

            const imported =
                JSON.parse(text);

            if(!Array.isArray(imported)){

                alert(
                    "Invalid backup file."
                );

                return;
            }

            localStorage.setItem(
                "songsData",
                JSON.stringify(imported)
            );

            songs = imported;

            render();

            alert(
                "Backup imported successfully."
            );

            alert(

    }
);
