<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{ --scale:1; }

html, body{
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    touch-action:manipulation;
    overflow-x:hidden;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#0f172a;
    z-index:10;
}

#searchWrap{ position:relative; }

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
    font-size:18px;
    user-select:none;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
}

#clockBox{
    font-size:34px;
    font-weight:800;
    color:#e2e8f0;
    min-width:140px;
    text-align:right;
    letter-spacing:1px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
}

#songCount{
    color:#94a3b8;
    font-size:16px;
    font-weight:600;
    min-width:120px;
    text-align:center;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}

#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns:repeat(2,1fr);
}

@media(max-width:600px){ #results{grid-template-columns:repeat(2,1fr);} }
@media(min-width:700px){ #results{grid-template-columns:repeat(3,1fr);} }
@media(min-width:1100px){ #results{grid-template-columns:repeat(4,1fr);} }

.card{
    background:#1e293b;
    border-radius:16px;
    padding:calc(14px * var(--scale));
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:calc(16px * var(--scale));
    user-select:none;
}

.title{
    font-size:calc(18px * var(--scale));
    font-weight:700;
}

.meta{
    font-size:calc(13px * var(--scale));
    color:#94a3b8;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
    font-size:calc(15px * var(--scale));
}
</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="controls">

        <span id="fontLabel">Text size</span>
        <button id="fontMinus">−</button>
        <button id="fontPlus">+</button>

        <span style="color:#94a3b8;font-size:13px;margin-left:12px;">Sort by</span>

        <button id="sortArtist">Artist</button>
        <button id="sortTitle">Title</button>
        <button id="sortBpm">BPM</button>

        <!-- NEW TOGGLE -->
        <button id="sortDir">A–Z</button>

    </div>

    <div id="songCount"></div>
    <div id="clockBox"></div>
</div>

<div id="chipContainer"></div>
</div>

<div id="results"></div>

<script>

let songs=[];
let currentQuery="";
let scale=1;

let sortKey=null;
let sortDirection="asc"; // NEW

const filters=["Favourites","Upbeat","Dancefloor","Sing-a-Long","Happy","Easy To Sing","Romantic","Showcase"];
const activeFilters=new Set();

function pad(n){return n.toString().padStart(2,'0');}

function updateClock(){
    const now=new Date();
    document.getElementById("clockBox").innerText=
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

function applyScale(){
    document.documentElement.style.setProperty("--scale",scale);
}

function updateCount(count){
    document.getElementById("songCount").innerText = count + " songs";
}

function normalize(t){return (t||"").toLowerCase();}

function songMatches(song,q){
    q=normalize(q.trim());
    if(!q) return true;
    const text=normalize(Object.values(song).join(" "));
    if(/^\d+$/.test(q)) return new RegExp(`\\b${q}\\b`).test(text);
    if(q.includes(" ")) return q.split(/\s+/).every(w=>text.includes(w));
    return text.includes(q);
}

function passesFilters(song){
    if(activeFilters.size===0) return true;
    const map={};
    Object.keys(song).forEach(k=>map[k.trim().toLowerCase()]=song[k]);
    return [...activeFilters].every(f=>{
        const v=map[f.toLowerCase()];
        const s=(v||"").toString().toLowerCase();
        return v===true||s=="true"||s=="1"||s=="yes";
    });
}

function sortSongs(arr){
    if(!sortKey) return arr;

    return [...arr].sort((a,b)=>{

        const get = (v) =>
            (v === null || v === undefined)
                ? ""
                : v.toString().toLowerCase();

        let x="", y="";

        if(sortKey==="artist"){
            x=get(a["ARTIST"]);
            y=get(b["ARTIST"]);
        }
        else if(sortKey==="title"){
            x=get(a["SONG NAME"]);
            y=get(b["SONG NAME"]);
        }
        else if(sortKey==="bpm"){
            x=Number(a["Tempo"]??0);
            y=Number(b["Tempo"]??0);
        }

        let res=0;
        if(x>y) res=1;
        else if(x<y) res=-1;

        return sortDirection==="asc" ? res : -res;
    });
}

function render(){
    const r=document.getElementById("results");
    r.innerHTML="";

    let filtered=songs.filter(s=>songMatches(s,currentQuery)&&passesFilters(s));
    filtered=sortSongs(filtered);

    filtered.forEach(song=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <div class="title">${song["SONG NAME"]||""}</div>
            <div>${song["ARTIST"]||""}</div>
        `;

        r.appendChild(div);
    });

    updateClock();
    updateCount(filtered.length);
}

// EVENTS
document.getElementById("search").oninput=e=>{
    currentQuery=e.target.value;
    render();
};

document.getElementById("clearSearch").onclick=()=>{
    document.getElementById("search").value="";
    currentQuery="";
    render();
};

document.getElementById("fontPlus").onclick=()=>{
    scale=Math.min(2,scale+0.1);
    applyScale();
};

document.getElementById("fontMinus").onclick=()=>{
    scale=Math.max(0.6,scale-0.1);
    applyScale();
};

// SORT KEYS
document.getElementById("sortArtist").onclick=()=>{ sortKey="artist"; render(); };
document.getElementById("sortTitle").onclick=()=>{ sortKey="title"; render(); };
document.getElementById("sortBpm").onclick=()=>{ sortKey="bpm"; render(); };

// TOGGLE DIRECTION
const dirBtn=document.getElementById("sortDir");

dirBtn.onclick=()=>{
    sortDirection = (sortDirection==="asc") ? "desc" : "asc";
    dirBtn.innerText = sortDirection==="asc" ? "A–Z" : "Z–A";
    render();
};

dirBtn.innerText="A–Z";

setInterval(updateClock,1000);

applyScale();
render();

</script>

</body>
</html>
