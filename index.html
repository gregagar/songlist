<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Finder</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    padding:20px;
    position:sticky;
    top:0;
    background:#0f172a;
    z-index:10;
}

#searchWrap{
    position:relative;
}

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:24px;
    border:none;
    border-radius:14px;
    outline:none;
}

#clearSearch{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
    font-size:18px;
    user-select:none;
}

#topRow{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

#controls{
    display:flex;
    gap:8px;
    align-items:center;
}

#fontLabel{
    color:#94a3b8;
    font-size:13px;
    margin-left:4px;
}

#clockBox{
    font-size:30px;
    font-weight:800;
    color:#e2e8f0;
    letter-spacing:1px;
    min-width:140px;
    text-align:right;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#e2e8f0;
    font-size:16px;
    cursor:pointer;
}

#chipContainer{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.chip{
    padding:6px 10px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    user-select:none;
    font-size:13px;
}

.chip.active{
    background:#38bdf8;
    color:black;
    font-weight:600;
}

#results{
    padding:20px;
    display:grid;
    gap:12px;
    grid-template-columns:repeat(1,1fr);
}

@media(min-width:600px){
    #results{grid-template-columns:repeat(2,1fr);}
}

@media(min-width:1000px){
    #results{grid-template-columns:repeat(3,1fr);}
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.title{
    font-size:18px;
    font-weight:700;
}

.meta{
    color:#94a3b8;
    font-size:13px;
}

.actions{
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.star{
    cursor:pointer;
    font-size:18px;
    color:#94a3b8;
}

.star.fav{
    color:#facc15;
}

a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="header">

<div id="searchWrap">
    <input id="search" placeholder="Search songs, artist, year, genre...">
    <span id="clearSearch">✕</span>
</div>

<div id="topRow">

    <div id="controls">
        <button id="fontMinus">−</button>
        <button id="fontPlus">+</button>
        <span id="fontLabel">Text size</span>
    </div>

    <div id="clockBox"></div>

</div>

<div id="chipContainer"></div>

</div>

<div id="results"></div>

<script>

let songs = [];
let currentQuery = "";
let fontSize = 16;
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

const filters = [
"Upbeat","Favourites","Dancefloor","Sing-a-Long","Happy","Easy To Sing","Romantic","Showcase"
];

const activeFilters = new Set();

function applyFont(){
    document.documentElement.style.setProperty("--fs", fontSize + "px");
}

function pad(n){
    return n.toString().padStart(2,'0');
}

function updateClock(){
    const now = new Date();
    const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById("clockBox").innerText = time;
}

function normalize(t){
    return (t||"").toLowerCase();
}

function songMatches(song,q){
    q = normalize(q.trim());
    if(!q) return true;

    const text = normalize(Object.values(song).join(" "));

    if(/^\d+$/.test(q)) return new RegExp(`\\b${q}\\b`).test(text);
    if(q.includes(" ")) return q.split(/\s+/).every(w=>text.includes(w));
    return text.includes(q);
}

function passesFilters(song){
    if(activeFilters.size===0) return true;

    const map = {};
    Object.keys(song).forEach(k=>map[k.trim().toLowerCase()]=song[k]);

    return [...activeFilters].every(f=>{
        const v = map[f.toLowerCase()];
        const s = (v||"").toString().toLowerCase();
        return v===true || s=="true" || s=="1" || s=="yes";
    });
}

function toggleFav(song){
    const id = song["SONG NAME"];
    if(favorites.includes(id)) favorites = favorites.filter(f=>f!==id);
    else favorites.push(id);
    localStorage.setItem("favorites",JSON.stringify(favorites));
    render();
}

function isFav(song){
    return favorites.includes(song["SONG NAME"]);
}

function buildChips(){
    const c=document.getElementById("chipContainer");
    c.innerHTML="";

    filters.forEach(f=>{
        const d=document.createElement("div");
        d.className="chip";
        d.innerText=f;
        d.onclick=()=>{
            if(activeFilters.has(f)) activeFilters.delete(f);
            else activeFilters.add(f);
            d.classList.toggle("active");
            render();
        };
        c.appendChild(d);
    });
}

function render(){
    const r=document.getElementById("results");
    r.innerHTML="";

    let list = songs.filter(s=>songMatches(s,currentQuery)&&passesFilters(s));

    list.forEach(song=>{
        const div=document.createElement("div");
        div.className="card";

        const link = song.Link || song.link || "";
        const finalLink = link || "#";

        div.innerHTML=`
            <div class="title">${song["SONG NAME"]||""}</div>
            <div>${song["ARTIST"]||""}</div>
            <div class="meta">${song.Year||""} ${song.Genre||""}</div>
            <div class="actions">
                <span class="star ${isFav(song)?"fav":""}">★</span>
                <a href="${finalLink}" target="_blank">Open</a>
            </div>
        `;

        div.querySelector(".star").onclick=()=>toggleFav(song);
        r.appendChild(div);
    });

    updateClock();
}

// EVENTS

document.getElementById("search").oninput=e=>{
    currentQuery=e.target.value;
    render();
};

document.getElementById("clearSearch").onclick=()=>{
    document.getElementById("search").value="";
    currentQuery="";
    render();
};

document.getElementById("fontPlus").onclick=()=>{fontSize=Math.min(28,fontSize+2);applyFont();};
document.getElementById("fontMinus").onclick=()=>{fontSize=Math.max(10,fontSize-2);applyFont();};

async function load(){
    try{
        const res=await fetch("songs.json");
        songs=await res.json();
        localStorage.setItem("cache",JSON.stringify(songs));
    }catch(e){
        songs=JSON.parse(localStorage.getItem("cache")||"[]");
    }

    buildChips();
    render();
}

setInterval(updateClock,1000);

load();
applyFont();
updateClock();

</script>

</body>
</html>
